services:
  - type: web
    name: importadora-morazan-store
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: STORAGE_DIR
        value: /var/data
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
    disk:
      name: importadora-morazan-data
      mountPath: /var/data
      sizeGB: 1
